<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Czasu Cyklu (Cycle Time Scatterplot)</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .instructions {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            background-color: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            cursor: pointer;
        }
        input[type="number"], input[type="date"], input[type="text"], select {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            padding: 6px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        input[type="checkbox"] {
            cursor: pointer;
        }
        .divider {
            width: 100%;
            height: 1px;
            background-color: #ddd;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Czas realizacji zadań (Lead Times)</h1>
        
        <p class="instructions">
            <strong>Filtrowanie:</strong> Kliknij rozmiar w legendzie po prawej, aby go ukryć. <br>
            <strong>Usuwanie:</strong> Kliknij na dowolny punkt na wykresie, aby go usunąć ze zbioru.
        </p>

        <div class="controls">
            <div class="control-group">
                <strong>Dodaj nowy element:</strong>
            </div>
            <div class="control-group">
                <label for="newDate">Data ukończenia:</label>
                <input type="date" id="newDate" required>
            </div>
            <div class="control-group">
                <label for="newCT">Czas (dni):</label>
                <input type="number" id="newCT" min="1" placeholder="np. 15" style="width: 70px;" required>
            </div>
            <div class="control-group">
                <label for="newSize">Rozmiar:</label>
                <select id="newSize">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>
            </div>
            <div class="control-group">
                <label for="newComment">Komentarz:</label>
                <input type="text" id="newComment" placeholder="Opcjonalny opis" style="width: 180px;">
            </div>
            <button onclick="addDataPoint()">Dodaj</button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="timeFilter"><strong>Pokaż ostatnie miesiące:</strong></label>
                <input type="number" id="timeFilter" min="1" placeholder="np. 3" oninput="updateChart()" style="width: 80px;">
                <span style="font-size: 12px; color: #666;">(zostaw puste dla wszystkich)</span>
            </div>
            <div style="width: 20px;"></div> <div class="control-group">
                <strong>Linie Percentyli:</strong>
                <label><input type="checkbox" id="p50" onchange="updateChart()"> 50%</label>
                <label><input type="checkbox" id="p85" onchange="updateChart()"> 85%</label>
                <label><input type="checkbox" id="p99" onchange="updateChart()"> 99%</label>
            </div>
        </div>

        <div id="scatterPlot" style="width:100%; height:600px;"></div>
    </div>

    <script>
        // Słownik do tłumaczenia nazw miesięcy
        const polishMonths = ["Stycznia", "Lutego", "Marca", "Kwietnia", "Maja", "Czerwca", "Lipca", "Sierpnia", "Września", "Października", "Listopada", "Grudnia"];

        // Płaska struktura początkowych danych
        let rawData = [
            {id: 1, size:"S", date:"2024-07-15", ct:49, text:"15 Lipca 2024"},
            {id: 2, size:"S", date:"2024-08-22", ct:48, text:"22 Sierpnia 2024"},
            {id: 3, size:"S", date:"2024-09-10", ct:87, text:"10 Września 2024"},
            {id: 4, size:"M", date:"2024-09-25", ct:57, text:"25 Września 2024"},
            {id: 5, size:"M", date:"2024-10-05", ct:148, text:"5 Października 2024"},
            {id: 6, size:"S", date:"2024-10-14", ct:53, text:"14 Października 2024"},
            {id: 7, size:"S", date:"2024-10-28", ct:45, text:"28 Października 2024"},
            {id: 8, size:"M", date:"2024-11-18", ct:145, text:"18 Listopada 2024"},
            {id: 9, size:"L", date:"2024-12-04", ct:105, text:"4 Grudnia 2024"},
            {id: 10, size:"S", date:"2025-01-08", ct:5, text:"8 Stycznia 2025"},
            {id: 11, size:"L", date:"2025-01-20", ct:163, text:"20 Stycznia 2025"},
            {id: 12, size:"S", date:"2025-02-14", ct:43, text:"14 Lutego 2025"},
            {id: 13, size:"M", date:"2025-02-26", ct:415, text:"26 Lutego 2025"},
            {id: 14, size:"L", date:"2025-03-15", ct:123, text:"15 Marca 2025"},
            {id: 15, size:"M", date:"2025-04-10", ct:103, text:"10 Kwietnia 2025"},
            {id: 16, size:"L", date:"2025-05-05", ct:104, text:"5 Maja 2025"},
            {id: 17, size:"L", date:"2025-06-12", ct:302, text:"12 Czerwca 2025"},
            {id: 18, size:"L", date:"2025-06-25", ct:158, text:"25 Czerwca 2025"},
            {id: 19, size:"L", date:"2025-07-02", ct:98, text:"2 Lipca 2025"},
            {id: 20, size:"S", date:"2025-07-11", ct:52, text:"11 Lipca 2025"},
            {id: 21, size:"M", date:"2025-07-18", ct:95, text:"18 Lipca 2025"},
            {id: 22, size:"S", date:"2025-07-29", ct:70, text:"29 Lipca 2025"},
            {id: 23, size:"M", date:"2025-08-03", ct:95, text:"3 Sierpnia 2025"},
            {id: 24, size:"M", date:"2025-08-14", ct:101, text:"14 Sierpnia 2025"},
            {id: 25, size:"M", date:"2025-08-21", ct:57, text:"21 Sierpnia 2025"},
            {id: 26, size:"M", date:"2025-08-29", ct:57, text:"29 Sierpnia 2025"},
            {id: 27, size:"S", date:"2025-09-08", ct:53, text:"8 Września 2025"},
            {id: 28, size:"L", date:"2025-09-22", ct:137, text:"22 Września 2025"},
            {id: 29, size:"S", date:"2025-10-04", ct:73, text:"4 Października 2025"},
            {id: 30, size:"M", date:"2025-10-12", ct:60, text:"12 Października 2025"},
            {id: 31, size:"S", date:"2025-10-19", ct:126, text:"19 Października 2025"},
            {id: 32, size:"M", date:"2025-10-27", ct:57, text:"27 Października 2025"},
            {id: 33, size:"L", date:"2025-11-05", ct:124, text:"5 Listopada 2025"},
            {id: 34, size:"M", date:"2025-11-15", ct:75, text:"15 Listopada 2025"},
            {id: 35, size:"M", date:"2025-11-25", ct:89, text:"25 Listopada 2025"},
            {id: 36, size:"S", date:"2025-12-10", ct:44, text:"10 Grudnia 2025"}
        ];

        // Funkcja do obliczania percentyla
        function calculatePercentile(values, p) {
            if (values.length === 0) return 0;
            const sorted = [...values].sort((a, b) => a - b);
            const index = (p / 100) * (sorted.length - 1);
            const lower = Math.floor(index);
            const upper = Math.ceil(index);
            const weight = index % 1;
            if (lower === upper) return sorted[lower];
            return sorted[lower] * (1 - weight) + sorted[upper] * weight;
        }

        // Funkcja obsługująca dodawanie nowego punktu z formularza
        function addDataPoint() {
            const dateInput = document.getElementById('newDate').value;
            const ctInput = document.getElementById('newCT').value;
            const sizeInput = document.getElementById('newSize').value;
            const commentInput = document.getElementById('newComment').value;

            if (!dateInput || !ctInput) {
                alert("Wypełnij przynajmniej Datę ukończenia oraz Czas (dni)!");
                return;
            }

            // Generowanie unikalnego ID dla nowego punktu
            const newId = Date.now();
            
            // Formatowanie daty do wyświetlania w tooltipie
            const d = new Date(dateInput);
            const formattedDateText = `${d.getDate()} ${polishMonths[d.getMonth()]} ${d.getFullYear()}`;

            // Dodanie obiektu do głównej tablicy danych
            rawData.push({
                id: newId,
                size: sizeInput,
                date: dateInput,
                ct: parseInt(ctInput, 10),
                text: formattedDateText,
                comment: commentInput.trim()
            });

            // Czyszczenie formularza
            document.getElementById('newDate').value = '';
            document.getElementById('newCT').value = '';
            document.getElementById('newComment').value = '';

            // Przeliczenie i narysowanie wykresu na nowo
            updateChart();
        }

        // Główna funkcja aktualizująca wykres w zależności od ustawień
        function updateChart() {
            const monthsInput = document.getElementById('timeFilter').value;
            const showP50 = document.getElementById('p50').checked;
            const showP85 = document.getElementById('p85').checked;
            const showP99 = document.getElementById('p99').checked;

            let filteredData = [...rawData];

            // Filtrowanie dat po miesiącach (jeśli wpisano wartość)
            if (monthsInput && !isNaN(monthsInput) && parseInt(monthsInput) > 0) {
                const months = parseInt(monthsInput);
                if (filteredData.length > 0) {
                    const maxDate = new Date(Math.max(...filteredData.map(d => new Date(d.date))));
                    let limitDate = new Date(maxDate);
                    limitDate.setMonth(limitDate.getMonth() - months);
                    filteredData = filteredData.filter(d => new Date(d.date) >= limitDate);
                }
            }

            // Generowanie podgrup do wyświetlenia
            const sizes = { 'S': '#E95A74', 'M': '#8C65D3', 'L': '#43A074' };
            const traces = [];

            Object.keys(sizes).forEach(s => {
                const points = filteredData.filter(d => d.size === s);
                traces.push({
                    x: points.map(p => p.date),
                    y: points.map(p => p.ct),
                    customdata: points.map(p => p.id), // Przechowujemy ID punktu
                    mode: 'markers',
                    type: 'scatter',
                    name: `Rozmiar ${s}`,
                    marker: { size: 12, color: sizes[s], line: {width: 1, color: 'white'} },
                    text: points.map(p => {
                        let tooltip = `<b>${p.text}</b><br>Czas realizacji: ${p.ct} dni`;
                        if (p.comment) {
                            tooltip += `<br>Komentarz: <i>${p.comment}</i>`;
                        }
                        tooltip += `<br><span style="font-size:10px; color:#888;">(Kliknij by usunąć)</span>`;
                        return tooltip;
                    }),
                    hoverinfo: 'text+name'
                });
            });

            // Generowanie linii i adnotacji percentyli
            const allCTs = filteredData.map(d => d.ct);
            const shapes = [];
            const annotations = [];

            function addPercentileLine(p, color, name) {
                if(allCTs.length === 0) return;
                const val = calculatePercentile(allCTs, p);
                
                shapes.push({
                    type: 'line',
                    x0: 0, x1: 1, xref: 'paper',
                    y0: val, y1: val, yref: 'y',
                    line: { color: color, width: 2, dash: 'dash' }
                });
                
                annotations.push({
                    x: 1, y: val, xref: 'paper', yref: 'y',
                    text: `<b>${name} (${Math.round(val)}d)</b>`,
                    showarrow: false,
                    xanchor: 'left',
                    yanchor: 'bottom',
                    xshift: 10,
                    font: { color: color, size: 12 }
                });
            }

            if (showP50) addPercentileLine(50, '#3b82f6', '50%'); // Niebieski
            if (showP85) addPercentileLine(85, '#f59e0b', '85%'); // Pomarańczowy
            if (showP99) addPercentileLine(99, '#ef4444', '99%'); // Czerwony

            const layout = {
                xaxis: { title: 'Data ukończenia', type: 'date', gridcolor: '#e9ecef' },
                yaxis: { title: 'Czas cyklu / realizacji (dni)', gridcolor: '#e9ecef', zeroline: false },
                plot_bgcolor: 'white', paper_bgcolor: 'white',
                hovermode: 'closest', shapes: shapes, annotations: annotations,
                margin: { r: 100 },
                legend: { title: { text: '<b>Filtruj po wielkości</b>' }, bgcolor: '#f8f9fa', bordercolor: '#dee2e6', borderwidth: 1 }
            };

            // Użycie Plotly.react do płynnego odświeżania
            Plotly.react('scatterPlot', traces, layout, { responsive: true, displayModeBar: false });
        }

        // Inicjalizacja po załadowaniu okna
        window.onload = function() {
            Plotly.newPlot('scatterPlot', [], {}, { responsive: true, displayModeBar: false });
            
            // Obsługa kliknięcia (usuwanie punktu)
            document.getElementById('scatterPlot').on('plotly_click', function(data) {
                if(data.points.length > 0) {
                    const point = data.points[0];
                    const pointId = point.customdata;
                    
                    const index = rawData.findIndex(d => d.id === pointId);
                    if (index !== -1) {
                        const item = rawData[index];
                        if(confirm(`Czy na pewno chcesz usunąć ten element?\nData: ${item.text}\nCzas realizacji: ${item.ct} dni\nRozmiar: ${item.size}`)) {
                            rawData.splice(index, 1);
                            updateChart();
                        }
                    }
                }
            });

            updateChart();
        };
    </script>
</body>
</html>
