<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Czasu Cyklu (Cycle Time Scatterplot)</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            background-color: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            cursor: pointer;
        }
        select, input[type="checkbox"] {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Czas realizacji zadań (Lead Times)</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="timeFilter"><strong>Zakres czasu:</strong></label>
                <select id="timeFilter" onchange="updateChart()">
                    <option value="all">Wszystkie dane</option>
                    <option value="6m">Ostatnie 6 miesięcy</option>
                    <option value="3m">Ostatnie 3 miesiące</option>
                </select>
            </div>
            <div class="control-group">
                <strong>Percentyle:</strong>
                <label><input type="checkbox" id="p50" onchange="updateChart()"> 50%</label>
                <label><input type="checkbox" id="p85" onchange="updateChart()"> 85%</label>
                <label><input type="checkbox" id="p99" onchange="updateChart()"> 99%</label>
            </div>
        </div>

        <div id="scatterPlot" style="width:100%; height:600px;"></div>
    </div>

    <script>
        // Płaska struktura danych połączona w jedną listę (łatwiejsze filtrowanie)
        const rawData = [
            {"size":"S","date":"2024-07-15","ct":49,"text":"15 Lipca 2024"},
            {"size":"S","date":"2024-08-22","ct":48,"text":"22 Sierpnia 2024"},
            {"size":"S","date":"2024-09-10","ct":87,"text":"10 Września 2024"},
            {"size":"M","date":"2024-09-25","ct":57,"text":"25 Września 2024"},
            {"size":"M","date":"2024-10-05","ct":148,"text":"5 Października 2024"},
            {"size":"S","date":"2024-10-14","ct":53,"text":"14 Października 2024"},
            {"size":"S","date":"2024-10-28","ct":45,"text":"28 Października 2024"},
            {"size":"M","date":"2024-11-18","ct":145,"text":"18 Listopada 2024"},
            {"size":"L","date":"2024-12-04","ct":105,"text":"4 Grudnia 2024"},
            {"size":"S","date":"2025-01-08","ct":5,"text":"8 Stycznia 2025"},
            {"size":"L","date":"2025-01-20","ct":163,"text":"20 Stycznia 2025"},
            {"size":"S","date":"2025-02-14","ct":43,"text":"14 Lutego 2025"},
            {"size":"M","date":"2025-02-26","ct":415,"text":"26 Lutego 2025"},
            {"size":"L","date":"2025-03-15","ct":123,"text":"15 Marca 2025"},
            {"size":"M","date":"2025-04-10","ct":103,"text":"10 Kwietnia 2025"},
            {"size":"L","date":"2025-05-05","ct":104,"text":"5 Maja 2025"},
            {"size":"L","date":"2025-06-12","ct":302,"text":"12 Czerwca 2025"},
            {"size":"L","date":"2025-06-25","ct":158,"text":"25 Czerwca 2025"},
            {"size":"L","date":"2025-07-02","ct":98,"text":"2 Lipca 2025"},
            {"size":"S","date":"2025-07-11","ct":52,"text":"11 Lipca 2025"},
            {"size":"M","date":"2025-07-18","ct":95,"text":"18 Lipca 2025"},
            {"size":"S","date":"2025-07-29","ct":70,"text":"29 Lipca 2025"},
            {"size":"M","date":"2025-08-03","ct":95,"text":"3 Sierpnia 2025"},
            {"size":"M","date":"2025-08-14","ct":101,"text":"14 Sierpnia 2025"},
            {"size":"M","date":"2025-08-21","ct":57,"text":"21 Sierpnia 2025"},
            {"size":"M","date":"2025-08-29","ct":57,"text":"29 Sierpnia 2025"},
            {"size":"S","date":"2025-09-08","ct":53,"text":"8 Września 2025"},
            {"size":"L","date":"2025-09-22","ct":137,"text":"22 Września 2025"},
            {"size":"S","date":"2025-10-04","ct":73,"text":"4 Października 2025"},
            {"size":"M","date":"2025-10-12","ct":60,"text":"12 Października 2025"},
            {"size":"S","date":"2025-10-19","ct":126,"text":"19 Października 2025"},
            {"size":"M","date":"2025-10-27","ct":57,"text":"27 Października 2025"},
            {"size":"L","date":"2025-11-05","ct":124,"text":"5 Listopada 2025"},
            {"size":"M","date":"2025-11-15","ct":75,"text":"15 Listopada 2025"},
            {"size":"M","date":"2025-11-25","ct":89,"text":"25 Listopada 2025"},
            {"size":"S","date":"2025-12-10","ct":44,"text":"10 Grudnia 2025"}
        ];

        // Funkcja do obliczania percentyla
        function calculatePercentile(values, p) {
            if (values.length === 0) return 0;
            const sorted = [...values].sort((a, b) => a - b);
            const index = (p / 100) * (sorted.length - 1);
            const lower = Math.floor(index);
            const upper = Math.ceil(index);
            const weight = index % 1;
            if (lower === upper) return sorted[lower];
            return sorted[lower] * (1 - weight) + sorted[upper] * weight;
        }

        // Główna funkcja aktualizująca wykres w zależności od ustawień
        function updateChart() {
            const timeFilter = document.getElementById('timeFilter').value;
            const showP50 = document.getElementById('p50').checked;
            const showP85 = document.getElementById('p85').checked;
            const showP99 = document.getElementById('p99').checked;

            // Filtrowanie dat
            // Jako że najnowsza data w zbiorze to 10 Grudnia 2025, to od niej liczymy miesiące wstecz
            let limitDate = new Date("2000-01-01"); // domyślnie bierzemy wszystko
            if (timeFilter === "3m") {
                limitDate = new Date("2025-09-10"); // Ostatnie 3 miesiące
            } else if (timeFilter === "6m") {
                limitDate = new Date("2025-06-10"); // Ostatnie 6 miesięcy
            }

            // Aplikujemy filtr czasowy
            const filteredData = rawData.filter(d => new Date(d.date) >= limitDate);

            // Generowanie podgrup do wyświetlenia
            const sizes = { 'S': '#E95A74', 'M': '#8C65D3', 'L': '#43A074' };
            const traces = [];

            Object.keys(sizes).forEach(s => {
                const points = filteredData.filter(d => d.size === s);
                traces.push({
                    x: points.map(p => p.date),
                    y: points.map(p => p.ct),
                    mode: 'markers',
                    type: 'scatter',
                    name: `Rozmiar ${s}`,
                    marker: { size: 12, color: sizes[s], line: {width: 1, color: 'white'} },
                    text: points.map(p => `${p.text}<br>Czas realizacji: ${p.ct} dni`),
                    hoverinfo: 'text+name'
                });
            });

            // Generowanie linii i adnotacji percentyli
            const allCTs = filteredData.map(d => d.ct);
            const shapes = [];
            const annotations = [];

            function addPercentileLine(p, color, name) {
                const val = calculatePercentile(allCTs, p);
                
                // Kreska na wykresie
                shapes.push({
                    type: 'line',
                    x0: 0, x1: 1, xref: 'paper',
                    y0: val, y1: val, yref: 'y',
                    line: { color: color, width: 2, dash: 'dash' }
                });
                
                // Tekst nad kreską po prawej stronie
                annotations.push({
                    x: 1, y: val, xref: 'paper', yref: 'y',
                    text: `<b>${name} (${Math.round(val)}d)</b>`,
                    showarrow: false,
                    xanchor: 'left',
                    yanchor: 'bottom',
                    xshift: 10,
                    font: { color: color, size: 12 }
                });
            }

            if (showP50) addPercentileLine(50, '#3b82f6', '50%'); // Niebieski
            if (showP85) addPercentileLine(85, '#f59e0b', '85%'); // Pomarańczowy
            if (showP99) addPercentileLine(99, '#ef4444', '99%'); // Czerwony

            const layout = {
                xaxis: { 
                    title: 'Data ukończenia', 
                    type: 'date', 
                    gridcolor: '#e9ecef' 
                },
                yaxis: { 
                    title: 'Czas cyklu / realizacji (dni)', 
                    gridcolor: '#e9ecef', 
                    zeroline: false 
                },
                plot_bgcolor: 'white',
                paper_bgcolor: 'white',
                hovermode: 'closest',
                shapes: shapes,
                annotations: annotations,
                margin: { r: 100 }, // Zostawia margines po prawej na podpisy percentyli
                legend: { 
                    title: { text: '<b>Filtruj po wielkości</b>' }, 
                    bgcolor: '#f8f9fa', 
                    bordercolor: '#dee2e6', 
                    borderwidth: 1 
                }
            };

            // Rysowanie zaktualizowanego wykresu
            Plotly.newPlot('scatterPlot', traces, layout, { responsive: true, displayModeBar: false });
        }

        // Pierwsze uruchomienie po załadowaniu okna
        window.onload = updateChart;
    </script>
</body>
</html>
